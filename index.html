<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 소주 완전 정리 가이드</title>
<meta name="description" content="고려 말부터 현재까지, 전국 소주 브랜드와 제조사를 지역별로 정리한 가이드입니다.">
<style>
  :root{
    --bg:#0f1115;
    --card:#171a21;
    --accent:#3aa6ff;
    --text:#e8eaed;
    --sub:#9aa3af;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 0%, #1a1f29 0%, var(--bg) 60%);
    color:var(--text);
    font-family:"Apple SD Gothic Neo","Malgun Gothic",-apple-system,sans-serif;
    padding:24px;
  }
  .wrap{
    max-width:560px;
    text-align:center;
  }
  .badge{
    display:inline-block;
    font-size:13px;
    color:var(--sub);
    border:1px solid #2a2f3a;
    border-radius:999px;
    padding:4px 14px;
    margin-bottom:20px;
    letter-spacing:.02em;
  }
  h1{
    font-size:clamp(28px,5vw,42px);
    line-height:1.3;
    margin:0 0 14px;
  }
  p.lead{
    color:var(--sub);
    font-size:16px;
    line-height:1.6;
    margin:0 0 32px;
  }
  .cta{
    display:inline-block;
    background:var(--accent);
    color:#06121f;
    font-weight:700;
    font-size:17px;
    padding:16px 36px;
    border-radius:12px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(58,166,255,.25);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(58,166,255,.35);
  }
  .meta{
    margin-top:24px;
    font-size:13px;
    color:var(--sub);
  }
  .sections{
    margin-top:48px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    text-align:left;
  }
  .sections a{
    background:var(--card);
    border:1px solid #232833;
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    color:var(--sub);
    text-decoration:none;
    display:block;
    transition:transform .15s ease, border-color .15s ease;
  }
  .sections a:hover{
    transform:translateY(-2px);
    border-color:var(--sub);
  }
  .sections a b{
    display:block;
    color:var(--text);
    font-size:13px;
    margin-bottom:2px;
  }
  @media (max-width:480px){
    .sections{grid-template-columns:1fr;}
  }
  .feedback-fab{
    position:fixed; bottom:20px; right:20px; z-index:1000;
    background:var(--accent); color:#0f1115; border:none; border-radius:999px;
    padding:12px 18px; font-size:14px; font-weight:600; cursor:pointer;
    box-shadow:0 8px 24px rgba(58,166,255,.35);
  }
  .feedback-panel{
    position:fixed; bottom:78px; right:20px; z-index:1000;
    width:280px; background:var(--card); border:1px solid #2a2f3a; border-radius:12px;
    padding:16px; box-shadow:0 12px 32px rgba(0,0,0,.4);
    display:none; text-align:left;
  }
  .feedback-panel.open{ display:block; }
  .feedback-panel .fb-title{ font-size:13px; font-weight:700; margin-bottom:8px; }
  .feedback-panel textarea, .feedback-panel input{
    width:100%; box-sizing:border-box; background:var(--bg); border:1px solid #2a2f3a;
    border-radius:8px; color:var(--text); padding:8px; font-size:13px; margin-bottom:8px;
    font-family:inherit;
  }
  .feedback-panel textarea{ min-height:80px; resize:vertical; }
  .feedback-panel button[type="submit"]{
    width:100%; background:var(--accent); color:#0f1115; border:none; border-radius:8px;
    padding:8px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .feedback-panel .fb-msg{ font-size:12px; color:var(--sub); margin-top:6px; min-height:14px; }
  @media (max-width:480px){
    .feedback-panel{ width:calc(100vw - 40px); right:20px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="badge">26.06 Edition</span>
    <h1>한국 소주 완전 정리 가이드</h1>
    <p class="lead">전국 소주 브랜드와 제조사를<br>지역별로 한눈에 정리했습니다.</p>
    <a class="cta" href="guide.html">가이드 보기 →</a>
    <div class="meta">최근 업데이트 2026.06</div>
    <div class="meta" id="visitorStats"></div>
    <div class="sections">
      <a href="guide.html#quickindex"><b>🔍 빠른 찾기</b>전 브랜드 검색·필터</a>
      <a href="guide.html#region"><b>🗺️ 지역별 브랜드</b>지도 기반 탐색</a>
      <a href="guide.html#timeline"><b>📅 타임라인</b>고려 말~현재</a>
      <a href="guide.html#discontinued"><b>📜 역사 속 브랜드</b>단종·변경·합병</a>
      <a href="guide.html#companies"><b>🏭 제조사 현황</b>주요 소주 제조사</a>
      <a href="guide.html#export"><b>✈️ 수출 브랜드</b>글로벌 라인업</a>
    </div>
  </div>
  <script>
    (function(){
      var ns = 'higherad-soju-guide-v2';
      var d = new Date();
      var dayKey = 'd' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
      var el = document.getElementById('visitorStats');
      function call(action, key){
        return fetch('https://abacus.jasoncameron.dev/' + action + '/' + ns + '/' + key)
          .then(function(r){ return r.json(); })
          .then(function(d){ return d.value; });
      }
      var visitedTotal = localStorage.getItem('sojuVisitedTotalV2') === '1';
      var visitedToday = localStorage.getItem('sojuVisitedDayV2') === dayKey;

      var totalP = visitedTotal ? call('get', 'total') : call('hit', 'total').then(function(v){
        localStorage.setItem('sojuVisitedTotalV2', '1');
        return v;
      });
      var todayP = visitedToday ? call('get', dayKey) : call('hit', dayKey).then(function(v){
        localStorage.setItem('sojuVisitedDayV2', dayKey);
        return v;
      });

      Promise.all([todayP, totalP]).then(function(v){
        el.textContent = '오늘 방문 ' + v[0] + ' · 전체 방문 ' + v[1];
      }).catch(function(){});
    })();
  </script>

  <button class="feedback-fab" id="feedbackFab">📩 제보</button>
  <div class="feedback-panel" id="feedbackPanel">
    <div class="fb-title">제보 / 정보 수정 요청</div>
    <form id="feedbackForm">
      <textarea name="message" placeholder="오타, 누락된 브랜드, 잘못된 정보 등 자유롭게 적어주세요" required></textarea>
      <input type="email" name="email" placeholder="답장 받을 메일 (선택)">
      <button type="submit">보내기</button>
      <div class="fb-msg" id="feedbackMsg"></div>
    </form>
  </div>
  <script>
    (function(){
      var endpoint = 'https://formspree.io/f/xkolggzz';
      var fab = document.getElementById('feedbackFab');
      var panel = document.getElementById('feedbackPanel');
      var form = document.getElementById('feedbackForm');
      var msg = document.getElementById('feedbackMsg');
      fab.addEventListener('click', function(){
        panel.classList.toggle('open');
      });
      form.addEventListener('submit', function(e){
        e.preventDefault();
        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        msg.textContent = '전송 중...';
        fetch(endpoint, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(form)
        }).then(function(r){
          msg.textContent = r.ok ? '전송됐습니다. 감사합니다!' : '전송 실패. 잠시 후 다시 시도해주세요.';
          if (r.ok) form.reset();
        }).catch(function(){
          msg.textContent = '전송 실패. 잠시 후 다시 시도해주세요.';
        }).finally(function(){
          btn.disabled = false;
        });
      });
    })();
  </script>
</body>
</html>

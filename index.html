<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 소주 완전 정리 가이드</title>
<meta name="description" content="고려 말부터 현재까지, 전국 소주 브랜드와 제조사를 지역별로 정리한 가이드입니다.">
<style>
  :root{
    --bg:#0f1115;
    --card:#171a21;
    --accent:#3aa6ff;
    --text:#e8eaed;
    --sub:#9aa3af;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 0%, #1a1f29 0%, var(--bg) 60%);
    color:var(--text);
    font-family:"Apple SD Gothic Neo","Malgun Gothic",-apple-system,sans-serif;
    padding:24px;
  }
  .wrap{
    max-width:560px;
    text-align:center;
  }
  .badge{
    display:inline-block;
    font-size:13px;
    color:var(--sub);
    border:1px solid #2a2f3a;
    border-radius:999px;
    padding:4px 14px;
    margin-bottom:20px;
    letter-spacing:.02em;
  }
  h1{
    font-size:clamp(28px,5vw,42px);
    line-height:1.3;
    margin:0 0 14px;
  }
  p.lead{
    color:var(--sub);
    font-size:16px;
    line-height:1.6;
    margin:0 0 32px;
  }
  .cta{
    display:inline-block;
    background:var(--accent);
    color:#06121f;
    font-weight:700;
    font-size:17px;
    padding:16px 36px;
    border-radius:12px;
    text-decoration:none;
    box-shadow:0 8px 24px rgba(58,166,255,.25);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(58,166,255,.35);
  }
  .meta{
    margin-top:24px;
    font-size:13px;
    color:var(--sub);
  }
  .sections{
    margin-top:48px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    text-align:left;
  }
  .sections div{
    background:var(--card);
    border:1px solid #232833;
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    color:var(--sub);
  }
  .sections div b{
    display:block;
    color:var(--text);
    font-size:13px;
    margin-bottom:2px;
  }
  @media (max-width:480px){
    .sections{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="badge">26.06 Edition</span>
    <h1>한국 소주 완전 정리 가이드</h1>
    <p class="lead">고려 말부터 현재까지, 전국 소주 브랜드와 제조사를<br>지역별로 한눈에 정리했습니다.</p>
    <a class="cta" href="guide.html">가이드 보기 →</a>
    <div class="meta">매달 업데이트됩니다 · 최근 업데이트 2026.06</div>
    <div class="sections">
      <div><b>🔍 빠른 찾기</b>전 브랜드 검색·필터</div>
      <div><b>🗺️ 지역별 브랜드</b>지도 기반 탐색</div>
      <div><b>📅 타임라인</b>고려 말~현재</div>
      <div><b>📜 역사 속 브랜드</b>단종·변경·합병</div>
      <div><b>🏭 제조사 현황</b>주요 소주 제조사</div>
      <div><b>✈️ 수출 브랜드</b>글로벌 라인업</div>
    </div>
  </div>
</body>
</html>

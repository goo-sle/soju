<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소주 가이드</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 48 64%22><rect x=%2219%22 y=%221%22 width=%2210%22 height=%225%22 rx=%221%22 fill=%22%230b5e2c%22/><rect x=%2220%22 y=%226%22 width=%228%22 height=%2210%22 rx=%221%22 fill=%22%231f9d55%22/><path d=%22M20 16L28 16L34 22L14 22Z%22 fill=%22%231f9d55%22/><path d=%22M14 22h20v33a3 3 0 0 1-3 3H17a3 3 0 0 1-3-3z%22 fill=%22%231f9d55%22/><rect x=%2216%22 y=%2234%22 width=%2216%22 height=%2214%22 fill=%22white%22/></svg>">
<meta name="description" content="전국 소주 브랜드와 제조사를 지역별로 정리한 가이드입니다.">
<style>
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:#f4f3ee;
    color:#111;
    font-family:"Apple SD Gothic Neo","Malgun Gothic",-apple-system,sans-serif;
    padding:48px 24px;
  }
  .wrap{ max-width:880px; margin:0 auto; }
  .tag{
    display:inline-block; font-size:13px; font-weight:700; letter-spacing:.05em;
    background:#111; color:#fff; padding:5px 14px; border-radius:999px; margin-bottom:24px;
  }
  h1{
    font-size:clamp(44px,9vw,96px);
    font-weight:900;
    line-height:1.02;
    letter-spacing:-.02em;
    margin:0 0 20px;
  }
  h1 .accent{ color:#2a8f5c; }
  p.lead{
    font-size:18px; color:#555; line-height:1.6; white-space:nowrap; margin:0 0 36px;
  }
  .bento{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-auto-rows:110px;
    gap:12px;
  }
  .bento .cta{
    grid-column:span 2; grid-row:span 2;
    background:#111; color:#fff;
    border-radius:20px;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:24px; text-decoration:none;
    transition:transform .15s ease;
  }
  .bento .cta:hover{ transform:translateY(-2px); }
  .bento .cta .go{ font-size:28px; font-weight:800; }
  .bento .cta .sub{ font-size:13px; color:#aaa; }
  .card{
    border-radius:20px; padding:18px; color:#111;
    display:flex; flex-direction:column; justify-content:space-between;
    text-decoration:none; font-weight:700;
    transition:transform .15s ease;
  }
  .card:hover{ transform:translateY(-2px); }
  .card .ico{ font-size:24px; }
  .card .name{ font-size:14px; }
  .c1{ background:#bcd9ff; grid-column:span 2; }
  .c2{ background:#ffe07a; }
  .c3{ background:#ffc4d6; }
  .c4{ background:#c8f3d4; }
  .c5{ background:#dcd0ff; grid-column:span 2; }
  .c6{ background:#ffd2ad; }
  @media (max-width:640px){
    .bento{ grid-template-columns:repeat(2,1fr); }
    .bento .cta{ grid-column:span 2; }
    .c1, .c5{ grid-column:span 2; }
  }
  @media (max-width:480px){
    p.lead{ font-size:14px; }
  }
  .stats-row{
    margin-top:18px; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
  }
  .stat-chip{
    background:#fff; border:1px solid #e3e1d8; border-radius:999px;
    padding:6px 14px; font-size:12px; color:#888;
  }
  .stat-chip b{ color:#111; font-weight:800; margin-right:4px; }
  .feedback-fab{
    position:fixed; bottom:20px; right:20px; z-index:1000;
    background:#111; color:#fff; border:none; border-radius:999px;
    padding:12px 18px; font-size:14px; font-weight:600; cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
    display:flex; align-items:center; gap:6px;
    transition:transform .15s ease;
  }
  .feedback-fab:hover{ transform:scale(1.05); }
  .feedback-fab svg{ width:16px; height:16px; flex-shrink:0; }
  .feedback-panel{
    position:fixed; bottom:78px; right:20px; z-index:1000;
    width:280px; background:#fff; border:1px solid #ddd; border-radius:16px;
    padding:16px; box-shadow:0 12px 32px rgba(0,0,0,.15);
    display:none; text-align:left;
  }
  .feedback-panel.open{ display:block; }
  .feedback-panel .fb-title{ font-size:13px; font-weight:700; margin-bottom:8px; color:#111; }
  .feedback-panel textarea, .feedback-panel input{
    width:100%; box-sizing:border-box; background:#f4f3ee; border:1px solid #ddd;
    border-radius:8px; color:#111; padding:8px; font-size:13px; margin-bottom:8px;
    font-family:inherit;
  }
  .feedback-panel textarea{ min-height:80px; resize:vertical; }
  .feedback-panel button[type="submit"]{
    width:100%; background:#111; color:#fff; border:none; border-radius:8px;
    padding:8px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .feedback-panel .fb-msg{ font-size:12px; color:#888; margin-top:6px; min-height:14px; }
  @media (max-width:480px){
    .feedback-panel{ width:calc(100vw - 40px); right:20px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="tag">26.06 EDITION</span>
    <h1>한국 <span class="accent">소주</span><br>완전 정리 가이드</h1>
    <p class="lead">전국 소주 브랜드와 제조사를 지역별로 한눈에 정리했습니다.</p>
    <div class="bento">
      <a class="cta" href="guide.html">
        <span class="sub">지금 바로</span>
        <span class="go">전체 보기 →</span>
      </a>
      <a class="card c1" href="guide.html#quickindex"><span class="ico">🔍</span><span class="name">빠른 찾기 — 전 브랜드 검색·필터</span></a>
      <a class="card c2" href="guide.html#timeline"><span class="ico">📅</span><span class="name">타임라인</span></a>
      <a class="card c3" href="guide.html#discontinued"><span class="ico">📜</span><span class="name">역사 속 브랜드</span></a>
      <a class="card c4" href="guide.html#companies"><span class="ico">🏭</span><span class="name">제조사 현황</span></a>
      <a class="card c5" href="guide.html#region"><span class="ico">🗺️</span><span class="name">지역별 브랜드 — 지도 기반 탐색</span></a>
      <a class="card c6" href="guide.html#export"><span class="ico">✈️</span><span class="name">수출 브랜드</span></a>
    </div>
    <div class="stats-row">
      <span class="stat-chip"><b id="statToday">-</b>오늘 방문</span>
      <span class="stat-chip"><b id="statTotal">-</b>전체 방문</span>
    </div>
  </div>
  <script>
    (function(){
      var ns = 'higherad-soju-guide';
      var d = new Date();
      var dayKey = 'd' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
      var elToday = document.getElementById('statToday');
      var elTotal = document.getElementById('statTotal');
      function call(action, key){
        return fetch('https://abacus.jasoncameron.dev/' + action + '/' + ns + '/' + key)
          .then(function(r){ return r.json(); })
          .then(function(d){ return d.value; });
      }
      var visitedTotal = localStorage.getItem('sojuVisitedTotal') === '1';
      var visitedToday = localStorage.getItem('sojuVisitedDay') === dayKey;

      var totalP = visitedTotal ? call('get', 'total') : call('hit', 'total').then(function(v){
        localStorage.setItem('sojuVisitedTotal', '1');
        return v;
      });
      var todayP = visitedToday ? call('get', dayKey) : call('hit', dayKey).then(function(v){
        localStorage.setItem('sojuVisitedDay', dayKey);
        return v;
      });

      Promise.all([todayP, totalP]).then(function(v){
        elToday.textContent = v[0];
        elTotal.textContent = v[1];
      }).catch(function(){});
    })();
  </script>

  <button class="feedback-fab" id="feedbackFab">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    제보하기
  </button>
  <div class="feedback-panel" id="feedbackPanel">
    <div class="fb-title">제보 / 정보 수정 요청</div>
    <form id="feedbackForm">
      <textarea name="message" placeholder="오타, 누락된 브랜드, 잘못된 정보 등 자유롭게 적어주세요" required></textarea>
      <button type="submit">보내기</button>
      <div class="fb-msg" id="feedbackMsg"></div>
    </form>
  </div>
  <script>
    (function(){
      var endpoint = 'https://formspree.io/f/xkolggzz';
      var fab = document.getElementById('feedbackFab');
      var panel = document.getElementById('feedbackPanel');
      var form = document.getElementById('feedbackForm');
      var msg = document.getElementById('feedbackMsg');
      fab.addEventListener('click', function(){
        panel.classList.toggle('open');
      });
      form.addEventListener('submit', function(e){
        e.preventDefault();
        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        msg.textContent = '전송 중...';
        fetch(endpoint, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(form)
        }).then(function(r){
          msg.textContent = r.ok ? '전송됐습니다. 감사합니다!' : '전송 실패. 잠시 후 다시 시도해주세요.';
          if (r.ok) form.reset();
        }).catch(function(){
          msg.textContent = '전송 실패. 잠시 후 다시 시도해주세요.';
        }).finally(function(){
          btn.disabled = false;
        });
      });
    })();
  </script>
</body>
</html>
